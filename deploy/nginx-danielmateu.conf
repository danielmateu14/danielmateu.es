# Nginx para danielmateu.es (Hetzner Cloud)
# Copiar a: /etc/nginx/sites-available/danielmateu
# Activar:  ln -sf /etc/nginx/sites-available/danielmateu /etc/nginx/sites-enabled/
# Probar:   nginx -t   &&   systemctl reload nginx
#
# Deja este bloque en HTTP y ejecuta certbot (ver DEPLOY-HETZNER.md): el plugin
# de nginx anade el bloque 443 y la redireccion, y se encarga del reto ACME en
# /.well-known/ antes de que la peticion llegue a Django.

server {
    listen 80;
    listen [::]:80;
    server_name danielmateu.es www.danielmateu.es;

    # Imagenes de proyectos subidas desde el admin
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml;

    # Estaticos: los nombres llevan hash (ManifestStaticFilesStorage),
    # asi que se pueden cachear para siempre sin miedo.
    location /static/ {
        alias /var/www/danielmateu.es/staticfiles/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Archivos subidos (MEDIA_ROOT) - persisten en el disco del servidor.
    # Sin hash en el nombre: cache mas corta por si se reemplaza una imagen.
    location /media/ {
        alias /var/www/danielmateu.es/media/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Todo lo demas -> gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
