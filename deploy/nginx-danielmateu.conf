# Nginx para danielmateu.es (Oracle Cloud Always Free)
# Copiar a: /etc/nginx/sites-available/danielmateu
# Activar:  sudo ln -s /etc/nginx/sites-available/danielmateu /etc/nginx/sites-enabled/
# Probar:   sudo nginx -t   &&   sudo systemctl reload nginx
#
# Tras dejar funcionando este bloque en HTTP, ejecuta certbot (ver DEPLOY.md),
# que añade automáticamente el bloque 443 + redirección a HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name danielmateu.es www.danielmateu.es;

    # Tamaño máximo de subida (imágenes de proyectos desde el admin)
    client_max_body_size 20M;

    # Archivos estáticos (recogidos con collectstatic en STATIC_ROOT)
    location /static/ {
        alias /home/ubuntu/danielmateu.es/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Archivos subidos (MEDIA_ROOT) — persisten en el disco de la VM
    location /media/ {
        alias /home/ubuntu/danielmateu.es/media/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Todo lo demás -> gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
