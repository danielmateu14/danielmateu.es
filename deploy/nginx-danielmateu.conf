# Nginx para danielmateu.es (Hetzner Cloud)
# Copiar a: /etc/nginx/sites-available/danielmateu
# Activar:  ln -sf /etc/nginx/sites-available/danielmateu /etc/nginx/sites-enabled/
# Probar:   nginx -t   &&   systemctl reload nginx
#
# Esta es la configuracion REAL en produccion, volcada tal cual desde
# /etc/nginx/sites-available/danielmateu: incluye ya lo que anadio certbot
# (bloque 443 y redireccion desde 80) y los location de la demo Ready4Padel.
#
# En una instalacion desde cero, deja solo el bloque HTTP y ejecuta certbot (ver DEPLOY-HETZNER.md): el plugin
# de nginx anade el bloque 443 y la redireccion, y se encarga del reto ACME en
# /.well-known/ antes de que la peticion llegue a Django.

server {
    server_name danielmateu.es www.danielmateu.es;

    # Imagenes de proyectos subidas desde el admin
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml;

    # Estaticos: los nombres llevan hash (ManifestStaticFilesStorage),
    # asi que se pueden cachear para siempre sin miedo.
    location /static/ {
        alias /var/www/danielmateu.es/staticfiles/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Archivos subidos (MEDIA_ROOT) - persisten en el disco del servidor.
    # Sin hash en el nombre: cache mas corta por si se reemplaza una imagen.
    location /media/ {
        alias /var/www/danielmateu.es/media/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # ------------------------------------------------------------------
    # Demo funcional Ready4Padel (app Django aparte, con su propio gunicorn).
    # Cuelga de este subpath via FORCE_SCRIPT_NAME en settings_prod.py.
    # Estos prefijos son mas largos que "location /", asi que ganan al
    # portfolio sin importar el orden en que esten escritos.
    # ------------------------------------------------------------------
    location = /proyectos/ready4padel {
        return 301 /proyectos/ready4padel/;
    }

    # El admin de Django de la demo trae un superusuario admin/admin
    # documentado en el propio repo. No se publica: la gestion se ensena
    # desde /panel/, que es la interfaz propia de la app.
    location ^~ /proyectos/ready4padel/admin/ {
        return 404;
    }

    location ^~ /proyectos/ready4padel/static/ {
        alias /var/www/proyectos/ready4padel/staticfiles/;
        expires 7d;
        access_log off;
    }

    # Los datos y las imagenes de la demo se regeneran cada noche: cache corta.
    location ^~ /proyectos/ready4padel/media/ {
        alias /var/www/proyectos/ready4padel/media/;
        expires 1d;
        access_log off;
    }

    location ^~ /proyectos/ready4padel/ {
        # El "/" final es imprescindible: le quita el prefijo a la URL antes de
        # pasarsela a Django, que espera PATH_INFO sin el. De reponerlo en los
        # enlaces que genera ya se encarga FORCE_SCRIPT_NAME.
        proxy_pass http://unix:/run/ready4padel/gunicorn.sock:/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Todo lo demas -> gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/danielmateu.es/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/danielmateu.es/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = www.danielmateu.es) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = danielmateu.es) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name danielmateu.es www.danielmateu.es;
    return 404; # managed by Certbot




}